<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Book Store</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="cart">
            <h2>Shopping Cart</h2>
            <p>This is a static representation of your cart.</p>
            <div class="cart-grid">
                <div class="cart-item">
                    <img src="book1.jpg" alt="Book Cover">
                    <div class="details">
                        <h3>Book Title</h3>
                        <p class="price">$20.00</p>
                        <p>Quantity: 1</p>
                    </div>
                    <button class="remove">Remove</button>
                </div>
                <div class="cart-item">
                    <img src="book2.jpg" alt="Book Cover">
                    <div class="details">
                        <h3>Book Title</h3>
                        <p class="price">$18.00</p>
                        <p>Quantity: 1</p>
                    </div>
                    <button class="remove">Remove</button>
                </div>
            </div>
            <div class="total">
                <p>Total Price: <span class="bold">$38.00</span></p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Book Store | Contact: info@bookstore.com</p>
    </footer>
</body>
</html>
